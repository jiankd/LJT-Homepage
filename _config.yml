# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Junteng Liu's Homepage
name: Junteng Liu
description: First-year PhD candidate at HKUST NLP Group, focusing on natural language processing, machine learning, LLM reasoning, LLM truthfulness, and vision-language model hallucination research.
url: "https://jiankd.github.io"
baseurl: "/LJT-Homepage" # the subpath of your site, e.g. /blog
repository: "jiankd/LJT-Homepage"
# logo: # path of logo image to display in the masthead, e.g. /assets/images/88x88.png
date_format: "%B %-d, %Y"
# Parse dates for pages that don't have a date in their filename or YAML front matter
date_from_filename: true

# Teaching and other collection content can be ordered by date, to reverse the order so the newest is first.
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/
  posts:
    output: true
    permalink: /:collection/:path/

# Build settings
markdown: kramdown
remote_theme: academicpages/academicpages.github.io
# theme: academicpages
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-spaceship

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - markdown_generator/

# Social sharing and commenting features, set your username to enable
analytics:
  google:
    tracking_id: UA-XXXXXXXX-X
  # true to expose just a simple cookie banner on every page, false to disable
  cookie_consent: false

comments:
  disqus:
    shortname: ""
  discourse:
    server: ""
  facebook:
    appid: ""
  giscus:
    repo: ""
    repo_id: ""
    category: ""
    category_id: ""
    mapping: "pathname"
    reactions_enabled: 1
    strict: 0
    emit_metadata: 1
    lang: en
    input_position: "bottom"
    loading: "lazy"
  staticman:
    repo: "username/repo"
    branch: "master"
    endpoint: "https://api.staticman.net/v2/entry"
  utterances:
    repo: ""

# Site Author
author:
  name: "Junteng Liu"
  avatar: "profile.jpg" # path of avatar image, e.g. "/assets/images/bio-photo.jpg"
  bio: "First-year PhD candidate at HKUST NLP Group, working on natural language processing and machine learning."
  location: "Hong Kong, China"
  email: "jliugi@connect.ust.hk"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:jliugi@connect.ust.hk"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Vicent0205"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?hl=en&user=tbK9jl4AAAAJ&view_op=list_works&sortby=pubdate"
    - label: "X (Twitter)"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://x.com/junteng88716710"

# Font Awesome Icons (version 6, free tier)
# Icons set to true will load from the CDN
font_awesome:
  sources:
    - "https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/fontawesome.min.css"
    - "https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/solid.min.css"
    - "https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/brands.min.css"